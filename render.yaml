services:
  - type: web
    name: llm-text-pipeline
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "streamlit run app2.py --server.port=$PORT --server.address=0.0.0.0"
    envVars:
      - key: STREAMLIT_SERVER_ENABLECORS
        value: false
      - key: STREAMLIT_SERVER_ENABLEXSRFPROTECTION
        value: false
